<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #main{
            width: 600px;
            height: 500px;
            margin: 20px auto;
            border: 2px solid bisque;
            background-color: burlywood;
            text-align: center;
        }
    </style>

</head>

<body style="background-color: lightgray;">
    
    <div id="main">
    <h1 style="font-size: 25px; font-family: cursive;color: brown;"> KEYBOARD EVENTS</h1><hr>

    <b><p style="font-size: 25px; font-family: cursive;color: rgb(24, 20, 20);" > ON KEY PRESS</p> </b>
    <input type="text" name="text" style="font-size: 25px; font-family: cursive;" onkeypress="alert(this.value)" >

    <b><p style="font-size: 25px; font-family: cursive;color: rgb(24, 20, 20);" > ON KEY UP</p> </b>
    <input type="text" name="text" style="font-size: 25px; font-family: cursive;"
     onkeyup="document.getElementById('main').style.background=this.value">

     <b><p style="font-size: 25px; font-family: cursive;color: rgb(24, 20, 20);" > ON KEY DOWN</p> </b>
     <input type="text" name="text" style="font-size: 25px; font-family: cursive;" onkeydown="alert(this.value)" >

   </div>
</body>
</html>
